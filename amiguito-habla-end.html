<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>¡Sapo! 🐸</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Baloo+2:wght@700;800;900&family=Schoolbell&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --papel: #FFF8E7; --tinta: #1E1206; --rojo: #E8332A;
  --amarillo: #FFD03A; --verde: #2D9E35; --verde-claro: #4DC95A;
  --azul: #1E7FBB; --naranja: #F5821F; --morado: #7B3FA0;
}
html, body { width: 100vw; height: 100vh; overflow: hidden; touch-action: manipulation; }
body {
  font-family: 'Baloo 2', cursive;
  background: #2D9E35;
  background-image:
    radial-gradient(ellipse at 15% 15%, #FFD03A28 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, #E8332A18 0%, transparent 45%),
    radial-gradient(ellipse at 50% 0%, #4DC95A40 0%, transparent 40%);
  display: flex; align-items: center; justify-content: center;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(circle, #ffffff12 1.5px, transparent 1.5px);
  background-size: 28px 28px; pointer-events: none; z-index: 0;
}
.libro {
  width: min(98vw, 700px); height: min(97vh, 840px);
  background: var(--papel); border-radius: 32px;
  border: 5px solid var(--tinta);
  box-shadow: 10px 10px 0 var(--tinta), inset 0 0 80px #FFE08812;
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 16px 10px; gap: 8px;
  position: relative; overflow: hidden; z-index: 1;
}
.libro::after {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 31px, #D4C9A818 32px);
  border-radius: 28px; pointer-events: none; z-index: 0;
}
.esquina { position: absolute; font-size: 1.5rem; z-index: 1; pointer-events: none; opacity: 0.5; }
.esquina.tl { top: 10px; left: 12px; transform: rotate(-20deg); }
.esquina.tr { top: 10px; right: 12px; transform: rotate(20deg); }
.esquina.bl { bottom: 10px; left: 12px; transform: rotate(15deg); }
.esquina.br { bottom: 10px; right: 12px; transform: rotate(-15deg); }
.titulo-wrap { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; width: 100%; }
.titulo {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1.8rem, 5.5vw, 3rem);
  color: var(--tinta); padding: 5px 24px;
  background: var(--amarillo); border: 3.5px solid var(--tinta);
  border-radius: 999px; box-shadow: 4px 4px 0 var(--tinta);
  transform: rotate(-1.2deg); letter-spacing: 1px;
}
.deco-star { position: absolute; font-size: 1.5rem; animation: giraStar 4s linear infinite; pointer-events: none; z-index: 2; }
.deco-star.izq { left: 8px; top: 4px; }
.deco-star.der { right: 8px; top: 4px; animation-direction: reverse; }
@keyframes giraStar { from{transform:rotate(0) scale(1)} 50%{transform:rotate(180deg) scale(1.4)} to{transform:rotate(360deg) scale(1)} }
.sapo-zona { position: relative; z-index: 2; display: flex; align-items: flex-end; justify-content: center; width: 100%; gap: 10px; }
.sapo-svg { width: clamp(88px, 20vw, 130px); height: auto; filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.25)); flex-shrink: 0; }
.sapo-svg.brinca  { animation: sapoSalta 1.8s ease-in-out infinite alternate; }
.sapo-svg.escucha { animation: sapoOye 0.5s ease-in-out infinite; }
.sapo-svg.habla   { animation: sapoHabla 0.28s ease-in-out infinite; }
@keyframes sapoSalta { from{transform:translateY(0) rotate(-3deg)} to{transform:translateY(-12px) rotate(3deg)} }
@keyframes sapoOye   { 0%,100%{transform:scale(1) rotate(-5deg)} 50%{transform:scale(1.12) rotate(5deg)} }
@keyframes sapoHabla { 0%,100%{transform:scaleY(1) translateY(0)} 50%{transform:scaleY(0.93) translateY(-5px)} }
.bocadillo-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.bocadillo {
  background: white; border: 3.5px solid var(--tinta); border-radius: 22px;
  padding: 12px 16px; position: relative; box-shadow: 4px 4px 0 var(--tinta);
  min-height: 68px; display: flex; align-items: center; justify-content: center;
  max-width: 400px; width: 100%;
}
.bocadillo::before { content: ''; position: absolute; left: -19px; bottom: 18px; border: 11px solid transparent; border-right-color: var(--tinta); }
.bocadillo::after  { content: ''; position: absolute; left: -11px; bottom: 20px; border: 9px solid transparent; border-right-color: white; z-index: 1; }
.bocadillo-texto { font-family: 'Baloo 2', cursive; font-size: clamp(0.95rem, 2.6vw, 1.3rem); font-weight: 700; color: var(--tinta); text-align: center; line-height: 1.35; position: relative; z-index: 2; }
.bocadillo-texto.vacio { font-family: 'Schoolbell', cursive; color: #B0A090; font-size: clamp(0.9rem, 2.3vw, 1.1rem); }
.puntitos { display: inline-flex; gap: 7px; align-items: center; }
.puntitos span { width: 13px; height: 13px; border-radius: 50%; border: 2.5px solid var(--tinta); animation: puntoBrinca 0.9s ease-in-out infinite; }
.puntitos span:nth-child(1){background:var(--rojo)} .puntitos span:nth-child(2){background:var(--amarillo);animation-delay:.2s} .puntitos span:nth-child(3){background:var(--azul);animation-delay:.4s}
@keyframes puntoBrinca { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.tira-escucho {
  z-index: 2; width: 88%; background: var(--azul);
  border: 3px solid var(--tinta); border-radius: 50px;
  padding: 8px 20px; text-align: center;
  font-family: 'Schoolbell', cursive; font-size: clamp(0.82rem, 2vw, 1rem);
  color: white; font-weight: 700; box-shadow: 3px 3px 0 var(--tinta);
  min-height: 36px; display: flex; align-items: center; justify-content: center;
  transition: background 0.3s;
}
.tira-escucho.activa { background: var(--verde-claro); }
.tira-escucho.error  { background: var(--rojo); }
.boton-wrap { z-index: 2; display: flex; flex-direction: column; align-items: center; }
.btn-habla {
  width: clamp(140px, 32vw, 200px); height: clamp(140px, 32vw, 200px);
  border-radius: 50%; border: 5px solid var(--tinta); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  background: var(--rojo);
  box-shadow: 7px 7px 0 var(--tinta), 0 0 0 8px var(--amarillo), 0 0 0 13px var(--tinta);
  transition: transform 0.12s, box-shadow 0.12s;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  position: relative; overflow: visible; user-select: none;
}
.btn-habla::before { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 3px dashed var(--tinta); animation: bordeDash 8s linear infinite; }
@keyframes bordeDash { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.btn-habla:active { transform: translate(5px,5px); box-shadow: 2px 2px 0 var(--tinta), 0 0 0 8px var(--amarillo), 0 0 0 13px var(--tinta); }
.btn-habla.escuchando { background: var(--verde-claro); animation: botonLatido 0.65s ease-in-out infinite; }
.btn-habla.pensando   { background: var(--morado); }
.btn-habla.hablando   { background: var(--naranja); }
@keyframes botonLatido { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
.play-triangle { width: 0; height: 0; border-top: clamp(22px,6vw,35px) solid transparent; border-bottom: clamp(22px,6vw,35px) solid transparent; border-left: clamp(36px,10vw,56px) solid white; margin-left: clamp(6px,2vw,10px); filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); pointer-events: none; flex-shrink: 0; }
.btn-icono { font-size: clamp(2.2rem,7vw,3.2rem); pointer-events: none; line-height: 1; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3)); }
.onda { position: absolute; border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); animation: ondaExpand 1.4s ease-out infinite; pointer-events: none; }
.onda:nth-child(2){animation-delay:.5s} .onda:nth-child(3){animation-delay:1s}
@keyframes ondaExpand { 0%{width:80%;height:80%;opacity:.7;top:10%;left:10%} 100%{width:185%;height:185%;opacity:0;top:-42%;left:-42%} }
.visualizer { display: flex; align-items: flex-end; gap: 3px; height: 28px; }
.bar { width: 6px; background: white; border-radius: 3px; animation: barBounce 0.6s ease-in-out infinite; }
.bar:nth-child(1){height:8px} .bar:nth-child(2){height:20px;animation-delay:.1s} .bar:nth-child(3){height:13px;animation-delay:.2s} .bar:nth-child(4){height:22px;animation-delay:.05s} .bar:nth-child(5){height:11px;animation-delay:.15s}
@keyframes barBounce { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1.2)} }
.temas { z-index: 2; display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; width: 100%; max-width: 600px; padding-bottom: 4px; }
.tema-btn { background: var(--papel); border: 3px solid var(--tinta); border-radius: 50px; padding: 6px 14px; font-family: 'Boogaloo', cursive; font-size: clamp(0.88rem,2.3vw,1.15rem); color: var(--tinta); cursor: pointer; box-shadow: 3px 3px 0 var(--tinta); transition: transform 0.1s, box-shadow 0.1s; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.tema-btn:nth-child(1){background:#FFE566} .tema-btn:nth-child(2){background:#B8F0C0} .tema-btn:nth-child(3){background:#FFB3CC} .tema-btn:nth-child(4){background:#B3D9FF} .tema-btn:nth-child(5){background:#FFD4A8} .tema-btn:nth-child(6){background:#E8C8FF}
.tema-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--tinta); }
.fiesta-container { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
.estrellita { position: absolute; font-size: 1.8rem; animation: vuelaEstrella 1.8s ease-out forwards; }
@keyframes vuelaEstrella { 0%{opacity:1;transform:scale(0.4) translateY(30px)} 45%{opacity:1;transform:scale(1.7) translateY(-70px) rotate(210deg)} 100%{opacity:0;transform:scale(0.7) translateY(-150px) rotate(400deg)} }
#debugBar { position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;font-size:11px;padding:4px 8px;z-index:99999;word-break:break-all;max-height:50px;overflow:auto; }
</style>
</head>

<script>
var PROXY_URL = 'https://toddler-ai-assistant-production.up.railway.app';
var VOICE_ID  = 'ajOR9IDAaubDK5qtLUqQ';

var estaEscuchando = false;
var estaCargando   = false;
var audioActual    = null;
var historial      = [];

function dbg(msg) {
  var el = document.getElementById('debugBar');
  if (el) el.textContent = msg;
  console.log(msg);
}

window.onerror = function(msg, src, line) {
  dbg('ERROR: ' + msg + ' L' + line);
  return false;
};

function getSistemaPrompt() {
  var ahora = new Date();
  var dias = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var dia = dias[ahora.getDay()];
  var fecha = ahora.getDate() + ' de ' + meses[ahora.getMonth()];
  var h = ahora.getHours();
  var m = ahora.getMinutes();
  var ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  var hora = h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;

  return 'Eres Sapo, un companero educativo y jugueton para ninos de 3 anos. Hablas en espanol latinoamericano.\n\n' +
    'HOY ES: ' + dia + ', ' + fecha + '. SON LAS: ' + hora + '\n\n' +
    'MISION: Enseniar, entretener y acompanar a ninos pequenos de forma SEGURA y EDUCATIVA.\n\n' +
    'REGLAS DE SEGURIDAD - NUNCA VIOLAR:\n' +
    '1. NUNCA uses lenguaje romantico o afectivo. PROHIBIDO: mi amor, corazon, cielo, bebe, hermoso, precioso, lindo, guapo, bonito, carinio, tesoro. USA SOLO: amiguito.\n' +
    '2. NUNCA hagas comentarios sobre apariencia fisica del nino.\n' +
    '3. NUNCA temas de miedo, violencia, contenido adulto.\n' +
    '4. Si el nino dice algo inapropiado, redirige: Hablemos de algo divertido.\n' +
    '5. NO eres un amigo romantico. Eres un maestro jugueton.\n\n' +
    'ESTILO:\n' +
    '6. Maximo 2 oraciones CORTAS.\n' +
    '7. Solo vocabulario que un nino de 3 anos entienda.\n' +
    '8. Animado: Wooow, Que chevere, Siii, Bacano, Genial.\n' +
    '9. 1 emoji al final.\n' +
    '10. Elogia SOLO esfuerzo e ideas: Que buena pregunta, Lo lograste, Eres muy inteligente.\n\n' +
    'EDUCACION:\n' +
    '11. Aprovecha para enseniar: numeros, colores, animales, formas, letras.\n' +
    '12. Para contar despacio: Uno... dos... tres...\n' +
    '13. Si imitan animales, imitalos y di el nombre.\n\n' +
    'IDENTIDAD:\n' +
    '14. Tu nombre es Sapo. Eres un sapito verde con gorrito rojo.\n' +
    '15. Si preguntan el dia o la hora, dilo de forma simple y divertida.';
}

function setTira(texto, clase) {
  var el = document.getElementById('tiraEscu');
  el.textContent = texto;
  el.className = 'tira-escucho' + (clase ? ' ' + clase : '');
}

function restaurarBoton() {
  var btn = document.getElementById('btnHabla');
  btn.className = 'btn-habla';
  btn.innerHTML = '<div class="play-triangle"></div>';
}

function estadoEscuchando(on) {
  estaEscuchando = on;
  var btn  = document.getElementById('btnHabla');
  var sapo = document.getElementById('sapoSvg');
  if (on) {
    btn.className = 'btn-habla escuchando';
    btn.innerHTML = '<div class="onda"></div><div class="onda"></div><div class="onda"></div><span class="btn-icono">👂</span>';
    sapo.className = 'sapo-svg escucha';
    setTira('🎙️ Escuchando...', 'activa');
  } else {
    restaurarBoton();
    sapo.className = 'sapo-svg brinca';
  }
}

// Attach button listener after DOM ready
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('btnHabla');
  btn.addEventListener('click', handleBtnHabla);
  btn.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleBtnHabla();
  });
  dbg('listo');
});

function handleBtnHabla() {
  dbg('tapped');
  if (audioActual) {
    audioActual.pause();
    audioActual = null;
    restaurarBoton();
    document.getElementById('sapoSvg').className = 'sapo-svg brinca';
    return;
  }
  if (estaEscuchando) { pararEscucha(); return; }
  if (estaCargando) return;
  iniciarMic();
}

function iniciarMic() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  dbg('SR: ' + (SR ? 'si' : 'NO'));
  if (!SR) { setTira('Este navegador no soporta microfono', 'error'); return; }

  var rec = new SR();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'es-419';
  rec.maxAlternatives = 3;

  var ultimoInterim = '';
  var yaEnvio = false;

  rec.onstart = function() {
    dbg('mic ON');
    ultimoInterim = '';
    yaEnvio = false;
    estadoEscuchando(true);
  };

  rec.onresult = function(e) {
    var interim = '', final = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (interim) ultimoInterim = interim;
    if (final && !yaEnvio) {
      yaEnvio = true;
      pararEscucha();
      enviarAIA(final.trim() || 'hola');
    }
  };

  rec.onerror = function(e) {
    dbg('mic error: ' + e.error);
    pararEscucha();
    if (e.error === 'not-allowed') setTira('Necesito permiso del microfono', 'error');
  };

  rec.onend = function() {
    dbg('mic ended, interim: ' + ultimoInterim);
    if (!yaEnvio && ultimoInterim.trim()) {
      yaEnvio = true;
      estaEscuchando = false;
      estadoEscuchando(false);
      enviarAIA(ultimoInterim.trim());
    } else if (estaEscuchando) {
      pararEscucha();
    }
  };

  try {
    rec.start();
    dbg('start OK');
  } catch(e) {
    dbg('start ERR: ' + e.message);
    setTira('Error micrófono: ' + e.message, 'error');
  }
}

function pararEscucha() {
  estaEscuchando = false;
  estadoEscuchando(false);
}

function preguntarTema(texto) {
  if (estaCargando || estaEscuchando) return;
  enviarAIA(texto);
}

function enviarAIA(textoUsuario) {
  dbg('enviando: ' + textoUsuario.substring(0,20));
  estaCargando = true;
  var btn  = document.getElementById('btnHabla');
  var sapo = document.getElementById('sapoSvg');
  btn.className = 'btn-habla pensando';
  btn.innerHTML = '<span class="btn-icono">🤔</span>';
  sapo.className = 'sapo-svg';
  document.getElementById('bocadilloTexto').className = 'bocadillo-texto';
  document.getElementById('bocadilloTexto').innerHTML = '<div class="puntitos"><span></span><span></span><span></span></div>';

  historial.push({ role: 'user', content: textoUsuario });
  if (historial.length > 10) historial = historial.slice(-10);

  fetch(PROXY_URL + '/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: getSistemaPrompt(),
      messages: historial
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var respuesta = (data && data.content && data.content[0] && data.content[0].text) ? data.content[0].text : 'Que chevere! 🌟';
    dbg('respuesta OK');
    historial.push({ role: 'assistant', content: respuesta });
    if (historial.length > 10) historial = historial.slice(-10);
    mostrarTexto(respuesta);
    hablarConEleven(respuesta);
    lanzarFiesta();
  })
  .catch(function(err) {
    dbg('chat error: ' + err.message);
    estaCargando = false;
    restaurarBoton();
    mostrarTexto('Ups! Intentalo de nuevo amiguito! 🐸');
    document.getElementById('sapoSvg').className = 'sapo-svg brinca';
  });
}

function mostrarTexto(texto) {
  var el = document.getElementById('bocadilloTexto');
  el.className = 'bocadillo-texto';
  el.textContent = texto;
  var boca = document.getElementById('bocaSapo');
  if (boca) {
    boca.setAttribute('d', 'M60 98 Q80 122 100 98');
    setTimeout(function() { boca.setAttribute('d', 'M58 100 Q80 116 102 100'); }, 4000);
  }
}

function hablarConEleven(texto) {
  var textoLimpio = texto.replace(/[\uD800-\uDFFF].|[^\x00-\x7F]/g, function(c) {
    var code = c.codePointAt ? c.codePointAt(0) : c.charCodeAt(0);
    return (code > 0x2000) ? '' : c;
  }).trim();
  if (!textoLimpio) { estaCargando = false; restaurarBoton(); return; }

  dbg('TTS: ' + textoLimpio.substring(0,20));

  fetch(PROXY_URL + '/api/tts/' + VOICE_ID, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text: textoLimpio,
      model_id: 'eleven_multilingual_v2',
      voice_settings: { stability: 0.55, similarity_boost: 0.80, style: 0.35, use_speaker_boost: true }
    })
  })
  .then(function(res) {
    dbg('TTS status: ' + res.status);
    if (!res.ok) throw new Error('TTS ' + res.status);
    return res.blob();
  })
  .then(function(blob) {
    var url = URL.createObjectURL(blob);
    var audio = new Audio(url);
    audioActual = audio;
    estaCargando = false;
    var sapo = document.getElementById('sapoSvg');
    var btn  = document.getElementById('btnHabla');
    audio.onplay = function() {
      sapo.className = 'sapo-svg habla';
      btn.className = 'btn-habla hablando';
      btn.innerHTML = '<div class="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>';
      dbg('playing!');
    };
    audio.onended = function() {
      audioActual = null;
      URL.revokeObjectURL(url);
      sapo.className = 'sapo-svg brinca';
      restaurarBoton();
      setTira('👂 Tu turno! Toca y habla!', '');
      dbg('done');
    };
    audio.onerror = function(e) {
      dbg('audio err: ' + e.type);
      audioActual = null;
      sapo.className = 'sapo-svg brinca';
      restaurarBoton();
    };
    audio.play().catch(function(e) { dbg('play blocked: ' + e.message); });
  })
  .catch(function(err) {
    dbg('TTS err: ' + err.message);
    estaCargando = false;
    restaurarBoton();
    var u = new SpeechSynthesisUtterance(textoLimpio);
    u.lang = 'es-MX'; u.rate = 0.9; u.pitch = 1.2;
    window.speechSynthesis.speak(u);
  });
}

function lanzarFiesta() {
  var cont = document.getElementById('fiestaContainer');
  var emojis = ['🌟','⭐','🎉','🎊','🌈','🎈','💛','❤️','💚','💙','🌺','🌸','✨','🦋','🎵','🍀'];
  for (var i = 0; i < 12; i++) {
    (function() {
      var e = document.createElement('div');
      e.className = 'estrellita';
      e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      e.style.left = (Math.random() * 86 + 5) + 'vw';
      e.style.top  = (Math.random() * 50 + 20) + 'vh';
      e.style.animationDelay = (Math.random() * 0.7) + 's';
      e.style.fontSize = (1.4 + Math.random() * 1.2) + 'rem';
      cont.appendChild(e);
      setTimeout(function() { e.remove(); }, 2800);
    })();
  }
}
</script>
